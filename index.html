<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW GB 차량 위치 보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3e;--accent:#1c69d4;--text:#e8e8f0;--text2:#8888aa;--sedan:#1c69d4;--suv:#2ecc71;--danger:#e74c3c;--warn:#f39c12;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--accent);}
.logo span{color:var(--text);}
.hdr-sub{font-size:10px;color:var(--text2);}
.hdr-actions{margin-left:auto;display:flex;gap:6px;align-items:center;}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#2575e0;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--text);}
.btn-danger{background:var(--danger);color:#fff;}
.move-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.move-btn.on{background:#27ae6022;color:#2ecc71;border-color:#27ae60;}
.admin-bar{display:none;background:#1c69d415;border-bottom:1px solid #1c69d430;padding:7px 16px;align-items:center;gap:8px;font-size:12px;}
.admin-bar.open{display:flex;}
.admin-label{color:var(--accent);font-weight:700;}
.board{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.zone{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s;}
.zone.drag-over{border-color:var(--accent);background:#1c69d410;}
.zone-hdr{background:var(--surface2);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.zone-name{font-weight:700;font-size:13px;}
.zone-cnt{background:var(--border);color:var(--text2);border-radius:10px;padding:1px 7px;font-size:11px;}
.zone-drag-handle{cursor:grab;color:var(--text2);font-size:16px;padding:0 2px;user-select:none;line-height:1;}
.zone-drag-handle:active{cursor:grabbing;}
.zone.zone-dragging{opacity:.4;border:2px dashed var(--accent);}
.zone.zone-drag-target{border-color:var(--warn);}
.zone-body{padding:8px;display:flex;flex-wrap:wrap;gap:6px;min-height:60px;}
/* 프라자 슬롯 */
.zone.plaza .zone-body{display:flex;flex-direction:column;gap:6px;}
.slot{border:1.5px dashed var(--border);border-radius:7px;min-height:52px;position:relative;transition:background .15s;display:flex;align-items:center;}
.slot.drag-over{border-color:var(--accent);background:#1c69d415;}
.slot-num{min-width:28px;text-align:center;font-size:13px;color:var(--border);font-weight:700;font-family:'Bebas Neue',sans-serif;flex-shrink:0;padding-left:6px;}
.slot-empty{display:flex;align-items:center;justify-content:center;width:100%;font-size:11px;color:var(--border);letter-spacing:1px;}
/* 시승차/신차/전시차 */
.mk-cartype{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-bottom:3px;letter-spacing:.5px;}
.mk-cartype.demo{background:#e74c3c33;color:#e74c3c;}
.mk-cartype.new{background:#1c69d433;color:#7ab3f0;}
.mk-cartype.display{background:#9b59b633;color:#c39bd3;}
.marker.demo{border-left:3px solid #e74c3c !important;}
.marker.new{border-left:3px solid var(--accent) !important;}
.marker.display{border-left:3px solid #9b59b6 !important;}
/* 마커 */
.marker{border-radius:6px;padding:5px 7px;width:100%;cursor:pointer;border:1.5px solid transparent;transition:transform .12s;user-select:none;}
.marker.sedan{background:#1c69d415;border-color:#1c69d440;}
.marker.suv{background:#2ecc7115;border-color:#2ecc7140;}
.marker:hover{transform:translateY(-1px);}
.marker.draggable{cursor:grab;}.marker.draggable:active{cursor:grabbing;}
.marker.dragging{opacity:.3;}
.mk-model{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.mk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sedan .mk-dot{background:var(--sedan);}.suv .mk-dot{background:var(--suv);}
.mk-color{font-size:11px;font-weight:700;color:var(--text2);line-height:1.6;}
.mk-plate{font-size:12px;color:var(--text);font-weight:700;margin-top:3px;}
.mk-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.mk-memo{font-size:10px;color:var(--warn);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-icon{padding:3px 6px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--text2);font-size:11px;cursor:pointer;line-height:1;transition:all .15s;}
.btn-icon:hover{border-color:var(--danger);color:var(--danger);}
/* 모달 */
.overlay{display:none;position:fixed;inset:0;background:#000b;z-index:500;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:92%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:55px;}
.fg select option{background:var(--surface);}
.frow{display:flex;gap:8px;}.frow .fg{flex:1;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
/* 상세 */
.det-model{font-size:19px;font-weight:700;margin-bottom:3px;}
.det-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:12px;}
.det-type.sedan{background:#1c69d430;color:var(--sedan);}
.det-type.suv{background:#2ecc7130;color:var(--suv);}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.det-item label{font-size:10px;color:var(--text2);}
.det-item .val{font-size:12px;font-weight:600;margin-top:2px;}
.det-memo{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--warn);border-radius:6px;padding:9px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;min-height:38px;}
/* 비번 */
.pw-dots{display:flex;gap:10px;justify-content:center;margin:12px 0;}
.pw-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);transition:all .12s;}
.pw-dot.filled{background:var(--accent);border-color:var(--accent);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.nk{padding:13px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:17px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'Bebas Neue',sans-serif;}
.nk:hover{background:var(--accent);border-color:var(--accent);}
.nk.del{color:var(--danger);}
.pw-err{color:var(--danger);font-size:11px;text-align:center;margin-top:6px;min-height:16px;}
.tag-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.tag-btn.on{color:#fff;}
.tag-btn.t0.on{background:#1c69d4;border-color:#1c69d4;}
.tag-btn.t1.on{background:#e67e22;border-color:#e67e22;}
.tag-btn.t2.on{background:#27ae60;border-color:#27ae60;}
.mk-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.mk-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;letter-spacing:.3px;}
.mk-tag.t0{background:#1c69d430;color:#7ab3f0;}
.mk-tag.t1{background:#e67e2230;color:#e89a4f;}
.mk-tag.t2{background:#27ae6030;color:#2ecc71;}
.tag-btn.t3.on{background:#e74c3c;border-color:#e74c3c;}
.mk-tag.t3{background:#e74c3c30;color:#e74c3c;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(55px);background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 16px;font-size:12px;transition:transform .25s;z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.search-bar{padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);}
.search-bar input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
.search-bar input:focus{border-color:var(--accent);}
.sheet-handle{display:none;width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@media(max-width:600px){
  .board{grid-template-columns:1fr;gap:8px;padding:8px;}
  .zone.plaza .zone-body{grid-template-columns:repeat(2,1fr);}
  .hdr-sub{display:none;}
  #detModal{align-items:flex-end;}
  #detModal .modal{width:100%;max-width:100%;border-radius:16px 16px 0 0;margin:0;max-height:85vh;}
  #detModal.open .modal{animation:slideUp .25s ease;}
  .sheet-handle{display:block;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">BMW <span>GB</span></div>
    <div class="hdr-sub">차량 위치 보드 · 한독모터스 강북전시장</div>
  </div>
  <div class="hdr-actions">
    <button class="move-btn" id="moveBtn" onclick="toggleMove()">🔒 이동 잠금</button>
    <button class="btn btn-ghost" onclick="openAdminLogin()">⚙️ 관리</button>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍  차종명 · 차량번호 · 담당자 검색" oninput="onSearch(this.value)">
</div>

<div class="admin-bar" id="adminBar">
  <span class="admin-label">👑 관리자</span>
  <button class="btn btn-primary" onclick="openAddMarker()">+ 차량 추가</button>
  <button class="btn btn-ghost" onclick="openAddZone()">+ 구역 추가</button>
  <button class="btn btn-ghost" onclick="openBulkModal()">📋 일괄 입력</button>
  <button class="btn btn-ghost" onclick="resetZones()" style="color:var(--warn);border-color:var(--warn);">🔄 구역 초기화</button>
  <button class="btn btn-ghost" onclick="openSettings()">비밀번호 변경</button>
  <button class="btn btn-danger" style="margin-left:auto" onclick="exitAdmin()">종료</button>
</div>

<div class="board" id="board"></div>
<div class="toast" id="toast"></div>

<!-- 상세 모달 -->
<div class="overlay" id="detModal">
  <div class="modal">
    <div class="sheet-handle"></div>
    <div id="detType" class="det-type"></div>
    <div id="detModel" class="det-model"></div>
    <div class="det-grid" id="detGrid"></div>
    <div style="font-size:10px;color:var(--text2);margin-bottom:5px;">📝 메모</div>
    <div class="det-memo" id="detMemo"></div>
    <div style="margin-top:12px;">
      <div style="font-size:10px;color:var(--text2);margin-bottom:7px;">📋 상태</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        <button class="tag-btn t0" id="tagBtn0" onclick="toggleTag('내려주세요')">내려주세요</button>
        <button class="tag-btn t1" id="tagBtn1" onclick="toggleTag('작업')">작업</button>
        <button class="tag-btn t2" id="tagBtn2" onclick="toggleTag('보관')">보관</button>
        <button class="tag-btn t3" id="tagBtn3" onclick="toggleTag('인도')">인도</button>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="btn btn-ghost" id="detEditBtn" onclick="editFromDetail()" style="display:none">✏️ 수정</button>
      <button class="btn btn-danger" id="detDelBtn" onclick="deleteFromDetail()" style="display:none">🗑️ 삭제</button>
      <button class="btn btn-primary" onclick="closeModal('detModal')">닫기</button>
    </div>
  </div>
</div>

<!-- 차량 추가/수정 모달 -->
<div class="overlay" id="markerModal">
  <div class="modal">
    <h2 id="markerTitle">차량 추가</h2>
    <div class="fg">
      <label>차량 구분 *</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <label style="display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;padding:10px;border-radius:8px;border:2px solid var(--border);transition:all .15s;" id="lbl-new">
          <input type="radio" name="cartype" id="ct-new" value="new" checked onchange="onCartypeChange()" style="accent-color:var(--accent);width:15px;height:15px;">
          <span style="font-size:13px;font-weight:700;color:#7ab3f0;">🚗 신차</span>
        </label>
        <label style="display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;padding:10px;border-radius:8px;border:2px solid var(--border);transition:all .15s;" id="lbl-demo">
          <input type="radio" name="cartype" id="ct-demo" value="demo" onchange="onCartypeChange()" style="accent-color:#e74c3c;width:15px;height:15px;">
          <span style="font-size:13px;font-weight:700;color:#e74c3c;">🏎️ 시승차</span>
        </label>
        <label style="display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;padding:10px;border-radius:8px;border:2px solid var(--border);transition:all .15s;" id="lbl-display">
          <input type="radio" name="cartype" id="ct-display" value="display" onchange="onCartypeChange()" style="accent-color:#9b59b6;width:15px;height:15px;">
          <span style="font-size:13px;font-weight:700;color:#c39bd3;">🏪 전시차</span>
        </label>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label>시리즈 *</label><select id="mSeries" onchange="onSeriesChange()"><option value="">-- 시리즈 선택 --</option></select></div>
      <div class="fg"><label>트림</label><select id="mTrim"><option value="">-- 트림 선택 --</option></select></div>
    </div>
    <div class="fg"><label>차종명 직접입력 (목록에 없을 때)</label><input type="text" id="mModel" placeholder="비워두면 트림명 자동 사용" /></div>
    <input type="hidden" id="mType" value="sedan" />
    <div class="frow">
      <div class="fg"><label>외장 색상코드</label><select id="mExt"><option value="">-- 선택 --</option></select></div>
      <div class="fg"><label>내장 색상코드</label><select id="mInt"><option value="">-- 선택 --</option></select></div>
    </div>
    <div class="frow">
      <div class="fg"><label>차량번호 / 차대번호</label><input type="text" id="mPlate" placeholder="예) 12가 3456 / VIN" /></div>
      <div class="fg"><label>담당자</label><input type="text" id="mOwner" placeholder="예) 김철수" /></div>
    </div>
    <div class="fg"><label>위치 (구역)</label><select id="mZone"></select></div>
    <div class="fg"><label>메모</label><textarea id="mMemo" placeholder="예) A직원 대차, 자택보관 중..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('markerModal')">취소</button>
      <button class="btn btn-primary" onclick="saveMarker()">저장</button>
    </div>
  </div>
</div>

<!-- 구역 추가 모달 -->
<div class="overlay" id="zoneModal">
  <div class="modal">
    <h2>구역 추가</h2>
    <div class="fg"><label>구역 이름 *</label><input type="text" id="zoneName" placeholder="예) 지하1층" /></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('zoneModal')">취소</button>
      <button class="btn btn-primary" onclick="saveZone()">추가</button>
    </div>
  </div>
</div>

<!-- 일괄 입력 모달 -->
<div class="overlay" id="bulkModal">
  <div class="modal" style="max-width:560px">
    <h2>📋 일괄 차량 입력</h2>
    <p style="font-size:11px;color:var(--text2);margin-bottom:12px;">엑셀에서 행을 복사(Ctrl+C) 후 아래에 붙여넣기 하세요.<br>인식 컬럼 순서: 번호 · 날짜 · <b>모델코드</b> · <b>차종명</b> · 내장코드 · <b>차대번호</b> · <b>외장색</b> · 상태 · 딜러 · (빈칸) · <b>담당자</b></p>
    <div class="frow">
      <div class="fg"><label>위치 (구역)</label><select id="bulkZone"></select></div>
    </div>
    <div class="fg"><label>데이터 붙여넣기 *</label><textarea id="bulkPaste" rows="5" placeholder="엑셀 행 선택 → Ctrl+C → 여기서 Ctrl+V"></textarea></div>
    <div id="bulkPreview"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('bulkModal')">취소</button>
      <button class="btn btn-ghost" onclick="parseBulk()">파싱</button>
      <button class="btn btn-primary" id="bulkImportBtn" style="display:none" onclick="importBulk()">가져오기</button>
    </div>
  </div>
</div>

<!-- 관리자 로그인 -->
<div class="overlay" id="adminModal">
  <div class="modal" style="max-width:290px">
    <h2 style="text-align:center">👑 관리자 모드</h2>
    <p style="text-align:center;font-size:11px;color:var(--text2);margin-top:-8px;margin-bottom:6px">관리자 비밀번호 입력</p>
    <div class="pw-dots" id="adminDots"><div class="pw-dot"></div><div class="pw-dot"></div><div class="pw-dot"></div><div class="pw-dot"></div></div>
    <div class="numpad" id="adminNumpad"></div>
    <div class="pw-err" id="adminErr"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('adminModal')">취소</button></div>
  </div>
</div>

<!-- 비밀번호 변경 -->
<div class="overlay" id="settingsModal">
  <div class="modal" style="max-width:340px">
    <h2>비밀번호 변경</h2>
    <div class="fg"><label>관리자 비밀번호 (4자리)</label><input type="password" id="newAdminPw" maxlength="4" placeholder="숫자 4자리" /></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('settingsModal')">취소</button>
      <button class="btn btn-primary" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyB7nO1BeQm-umq_2Lt5hi6iNKo4dDTE-Ws",
  authDomain:"bmw-gb-marker.firebaseapp.com",
  databaseURL:"https://bmw-gb-marker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"bmw-gb-marker",
  storageBucket:"bmw-gb-marker.firebasestorage.app",
  messagingSenderId:"809145777794",
  appId:"1:809145777794:web:b27c7d35f1ea56f5fe3e9b"
};

const DEFAULT_ZONES=[{name:"프라자",plaza:true},{name:"3F"},{name:"4F"},{name:"전시"},{name:"지점장님"},{name:"능이마을"},{name:"AS입고"},{name:"자택보관"},{name:"대차"}];
const DEFAULT_ADMIN_PW="0123";
const PLAZA_SLOTS=8;

let state={zones:{},markers:{},adminPw:DEFAULT_ADMIN_PW};
let isMovable=false,isAdmin=false,editingId=null,detailId=null,dragId=null,searchQuery='';

function initFirebase(){
  onValue(ref(db,'settings'),snap=>{const v=snap.val();if(v)state.adminPw=v.adminPw||DEFAULT_ADMIN_PW;});
  onValue(ref(db,'zones'),snap=>{
    const v=snap.val();
    if(!v){DEFAULT_ZONES.forEach((z,i)=>push(ref(db,'zones'),{...z,order:i}));return;}
    state.zones=v;renderBoard();
  });
  onValue(ref(db,'markers'),snap=>{state.markers=snap.val()||{};renderBoard();});
}

function renderBoard(){
  const board=document.getElementById('board');
  const sorted=Object.entries(state.zones).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  board.innerHTML='';
  sorted.forEach(([zid,zone])=>{
    const isPlaza=!!zone.plaza || zone.name==="프라자";
    const allMarkers=Object.entries(state.markers).filter(([,m])=>m.zoneId===zid);
    const markers=searchQuery
      ? allMarkers.filter(([,m])=>{const q=searchQuery;return(m.model||'').toLowerCase().includes(q)||(m.plate||'').toLowerCase().includes(q)||(m.owner||'').toLowerCase().includes(q);})
      : allMarkers;
    if(searchQuery && markers.length===0) return;
    const el=document.createElement('div');
    el.className='zone'+(isPlaza?' plaza':'');
    el.dataset.zoneid=zid;
    const hdr=document.createElement('div');
    hdr.className='zone-hdr';
    hdr.innerHTML=`
      <span class="zone-name">${zone.name}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="zone-cnt">${markers.length}</span>
        ${isAdmin?`<button class="btn-icon zone-del-btn" data-zoneid="${zid}" title="구역 삭제">🗑️</button><span class="zone-drag-handle" data-zoneid="${zid}" title="드래그로 순서변경">⠿</span>`:''}
      </div>`;
    if(isAdmin){
      const handle = hdr.querySelector('.zone-drag-handle');
      handle?.addEventListener('mousedown', startZoneDrag);
      handle?.addEventListener('touchstart', startZoneDrag, {passive:false});
      hdr.querySelector('.zone-del-btn')?.addEventListener('click', e=>{e.stopPropagation();window.deleteZone(e.currentTarget.dataset.zoneid);});
    }
    el.appendChild(hdr);
    const body=document.createElement('div');
    body.className='zone-body';
    if(isPlaza){
      for(let s=1;s<=PLAZA_SLOTS;s++){
        const slot=document.createElement('div');
        slot.className='slot';
        slot.dataset.slot=s;
        slot.dataset.zoneid=zid;
        const numEl=document.createElement('span');
        numEl.className='slot-num';
        numEl.textContent=s;
        slot.appendChild(numEl);
        const slotMarker=Object.entries(state.markers).find(([,m])=>m.zoneId===zid&&m.slot===s);
        if(slotMarker){
          const mEl=createMarkerEl(slotMarker[0],slotMarker[1]);
          mEl.style.flex='1';
          slot.appendChild(mEl);
        } else {
          const emp=document.createElement('div');
          emp.className='slot-empty';
          emp.textContent='비어있음';
          slot.appendChild(emp);
        }
        addSlotDrop(slot,zid,s);
        body.appendChild(slot);
      }
    } else {
      const order = c => c==='demo'?0:c==='display'?1:2;
      const sorted = [...markers].sort((a,b)=>order(a[1].cartype)-order(b[1].cartype));
      sorted.forEach(([mid,m])=>body.appendChild(createMarkerEl(mid,m)));
      addZoneDrop(body,zid,el);
    }
    el.appendChild(body);
    board.appendChild(el);
  });
  updateZoneSelects();
}

function createMarkerEl(mid,m){
  const el=document.createElement('div');
  el.className=`marker ${m.type||'sedan'}`+(isMovable?' draggable':'');
  el.draggable=isMovable;
  el.dataset.id=mid;
  const extTxt=m.extColor?`외 <span>${m.extColor}</span>`:'외 -';
  const intTxt=m.intColor?`내 <span>${m.intColor}</span>`:'내 -';
  const cartypeLabel = m.cartype==='demo' ? '🏎️ 시승차' : m.cartype==='display' ? '🏪 전시차' : '🚗 신차';
  const cartypeCls   = m.cartype==='demo' ? 'demo' : m.cartype==='display' ? 'display' : 'new';
  el.classList.add(cartypeCls);
  const colorLine = [m.extColor, m.intColor].filter(Boolean).join(' / ') || '-';
  const ownerPlate = [m.owner, m.plate].filter(Boolean).join(' · ') || '';
  const subItems = [];
  if(ownerPlate) subItems.push(`<span>${ownerPlate}</span>`);
  if(m.memo) subItems.push(`<span style="color:var(--warn)">📌 ${m.memo}</span>`);
  const subHtml = subItems.join(' · ');
  const activeTags = TAG_DEFS.filter(([name])=>(m.tags||{})[name]);
  const tagHtml = activeTags.length
    ? `<div class="mk-tags">${activeTags.map(([name,,idx])=>`<span class="mk-tag t${TAG_DEFS.findIndex(([n])=>n===name)}">${name}</span>`).join('')}</div>`
    : '';
  el.innerHTML=`
    <div class="mk-cartype ${cartypeCls}">${cartypeLabel}</div>
    <div class="mk-model"><span class="mk-dot"></span>${m.model||'-'} <span class="mk-colors-inline">${colorLine}</span></div>
    ${subHtml?`<div class="mk-sub" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${subHtml}</div>`:''}
    ${tagHtml}
  `;
  el.addEventListener('dragstart',e=>{if(!isMovable){e.preventDefault();return;}dragId=mid;setTimeout(()=>el.classList.add('dragging'),0);});
  el.addEventListener('dragend',()=>{el.classList.remove('dragging');dragId=null;});
  let tZone=null,tSlot=null;
  el.addEventListener('touchstart',()=>{if(isMovable)dragId=mid;},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!isMovable||!dragId)return;
    e.preventDefault();
    const t=e.touches[0];
    const target=document.elementFromPoint(t.clientX,t.clientY);
    const slot=target?.closest('.slot');
    const zb=target?.closest('.zone-body');
    if(slot){tZone=slot.dataset.zoneid||slot.closest('.zone')?.dataset.zoneid;tSlot=+slot.dataset.slot||null;}
    else if(zb){tZone=zb.closest('.zone')?.dataset.zoneid;tSlot=null;}
  },{passive:false});
  el.addEventListener('touchend',()=>{if(tZone&&dragId&&isMovable)moveMarker(dragId,tZone,tSlot);dragId=null;tZone=null;tSlot=null;});
  el.addEventListener('click',()=>openDetail(mid));
  return el;
}

function addZoneDrop(body, zid, zoneEl){
  // body + 전체 zone 어디든 드롭 허용
  [body, zoneEl].forEach(target=>{
    target.addEventListener('dragover',e=>{e.preventDefault();zoneEl.classList.add('drag-over');});
    target.addEventListener('dragleave',e=>{if(!zoneEl.contains(e.relatedTarget))zoneEl.classList.remove('drag-over');});
    target.addEventListener('drop',e=>{e.preventDefault();zoneEl.classList.remove('drag-over');if(dragId&&isMovable)moveMarker(dragId,zid,null);});
  });
}
function addSlotDrop(slot,zid,s){
  slot.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();slot.classList.add('drag-over');});
  slot.addEventListener('dragleave',e=>{if(!slot.contains(e.relatedTarget))slot.classList.remove('drag-over');});
  slot.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();slot.classList.remove('drag-over');if(dragId&&isMovable)moveMarker(dragId,zid,s);});
}
function moveMarker(mid,zid,slot){
  const upd={zoneId:zid,updatedAt:Date.now(),slot:slot||null};
  update(ref(db,`markers/${mid}`),upd);
  showToast('이동 완료');
}

// ── 구역 순서 드래그 ──────────────────────────────────
let zoneDragId = null;
function startZoneDrag(e){
  e.preventDefault();
  const handle = e.currentTarget;
  const zoneEl = handle.closest('.zone');
  if(!zoneEl) return;
  zoneDragId = zoneEl.dataset.zoneid;
  zoneEl.classList.add('zone-dragging');

  const markTarget = (clientX, clientY) => {
    const target = document.elementFromPoint(clientX, clientY)?.closest('.zone');
    document.querySelectorAll('.zone').forEach(z=>z.classList.remove('zone-drag-target'));
    if(target && target.dataset.zoneid !== zoneDragId) target.classList.add('zone-drag-target');
  };
  const finish = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
    zoneEl.classList.remove('zone-dragging');
    const target = document.querySelector('.zone.zone-drag-target');
    document.querySelectorAll('.zone').forEach(z=>z.classList.remove('zone-drag-target'));
    if(target && target.dataset.zoneid && target.dataset.zoneid !== zoneDragId){
      swapZoneOrder(zoneDragId, target.dataset.zoneid);
    }
    zoneDragId = null;
  };
  const onMove = ev => markTarget(ev.clientX, ev.clientY);
  const onUp = () => finish();
  const onTouchMove = ev => { ev.preventDefault(); const t=ev.touches[0]; markTarget(t.clientX,t.clientY); };
  const onTouchEnd = () => finish();
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onTouchMove, {passive:false});
  document.addEventListener('touchend', onTouchEnd);
}

window.deleteZone = function(zid){
  const zone = state.zones[zid];
  if(!zone) return;
  const hasMarkers = Object.values(state.markers).some(m=>m.zoneId===zid);
  if(hasMarkers){alert(`"${zone.name}" 구역에 차량이 있습니다.\n먼저 차량을 이동하거나 삭제해주세요.`);return;}
  if(!confirm(`"${zone.name}" 구역을 삭제하시겠습니까?`)) return;
  remove(ref(db,`zones/${zid}`));
  showToast(`"${zone.name}" 삭제됨`);
};

function swapZoneOrder(zidA, zidB){
  const sorted = Object.entries(state.zones).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  const idxA = sorted.findIndex(([id])=>id===zidA);
  const idxB = sorted.findIndex(([id])=>id===zidB);
  if(idxA===-1||idxB===-1) return;
  const reordered = [...sorted];
  const [item] = reordered.splice(idxA, 1);
  reordered.splice(idxB, 0, item);
  const batchUpdate = {};
  reordered.forEach(([id],i)=>{ batchUpdate[`zones/${id}/order`]=i; });
  update(ref(db), batchUpdate);
  showToast('구역 순서 변경됨');
}

window.toggleMove=function(){
  isMovable=!isMovable;
  const btn=document.getElementById('moveBtn');
  btn.className='move-btn'+(isMovable?' on':'');
  btn.textContent=isMovable?'🔓 이동 중':'🔒 이동 잠금';
  renderBoard();
  showToast(isMovable?'마커 이동 가능':'잠금됨');
};

window.saveMarker=function(){
  const series=document.getElementById('mSeries').value;
  const trim=document.getElementById('mTrim').value;
  const manual=document.getElementById('mModel').value.trim();
  const model=manual||trim||series;
  if(!model){alert('시리즈를 선택하거나 차종명을 입력하세요');return;}
  const autoType=series&&BMW_MODELS[series]?BMW_MODELS[series].type:'sedan';
  const cartype=document.querySelector('input[name="cartype"]:checked')?.value||'new';
  const data={model,series:series||'',type:autoType,cartype,extColor:document.getElementById('mExt').value,intColor:document.getElementById('mInt').value,plate:document.getElementById('mPlate').value.trim(),owner:document.getElementById('mOwner').value.trim(),zoneId:document.getElementById('mZone').value,memo:document.getElementById('mMemo').value.trim(),updatedAt:Date.now()};
  if(editingId){update(ref(db,`markers/${editingId}`),data);showToast('수정됨');}
  else{data.createdAt=Date.now();push(ref(db,'markers'),data);showToast('차량 추가됨');}
  closeModal('markerModal');
};

window.editFromDetail=function(){
  if(!detailId)return;
  const m=state.markers[detailId];
  closeModal('detModal');
  editingId=detailId;
  document.getElementById('markerTitle').textContent='차량 수정';
  clearForm();
  document.getElementById('mSeries').value=m.series||'';
  onSeriesChange();
  const tr=document.getElementById('mTrim');
  for(let o of tr.options)if(o.value===m.model){o.selected=true;break;}
  document.getElementById('mModel').value=(m.series&&BMW_MODELS[m.series]?.models.includes(m.model))?'':m.model;
  const ctId=m.cartype==='demo'?'ct-demo':m.cartype==='display'?'ct-display':'ct-new';
  const ctEl=document.getElementById(ctId);
  if(ctEl){ctEl.checked=true;onCartypeChange();}
  document.getElementById('mExt').value=m.extColor||'';
  document.getElementById('mInt').value=m.intColor||'';
  document.getElementById('mPlate').value=m.plate||'';
  document.getElementById('mOwner').value=m.owner||'';
  document.getElementById('mMemo').value=m.memo||'';
  updateZoneSelects();
  document.getElementById('mZone').value=m.zoneId||'';
  openModal('markerModal');
};

  closeModal('zoneModal');
  showToast(`"${name}" 추가됨`);
};

function openDetail(mid){
  const m=state.markers[mid];
  if(!m)return;
  detailId=mid;
  const typEl=document.getElementById('detType');
  typEl.className=`det-type ${m.type||'sedan'}`;
  typEl.textContent=m.type==='suv'?'SUV':'SEDAN';
  document.getElementById('detModel').textContent=m.model||'-';
  const extL=m.extColor?`${m.extColor}${EXT[m.extColor]?' · '+EXT[m.extColor]:''}`:'-';
  const intL=m.intColor?`${m.intColor}${INT[m.intColor]?' · '+INT[m.intColor]:''}`:'-';
  const zone=state.zones[m.zoneId]?.name||'-';
  document.getElementById('detGrid').innerHTML=`
    <div class="det-item"><label>외장</label><div class="val">${extL}</div></div>
    <div class="det-item"><label>내장</label><div class="val">${intL}</div></div>
    <div class="det-item"><label>차량번호</label><div class="val">${m.plate||'-'}</div></div>
    <div class="det-item"><label>담당자</label><div class="val">${m.owner||'-'}</div></div>
    <div class="det-item"><label>위치</label><div class="val">${zone}${m.slot?' ('+m.slot+'번)':''}</div></div>
    <div class="det-item"><label>업데이트</label><div class="val" style="font-size:10px">${m.updatedAt?new Date(m.updatedAt).toLocaleString('ko-KR'):'-'}</div></div>
  `;

  document.getElementById('detDelBtn').style.display=isAdmin?'':'none';

  openModal('detModal');
}

const TAG_DEFS=[['내려주세요','tagBtn0'],['작업','tagBtn1'],['보관','tagBtn2'],['인도','tagBtn3']];
function updateTagButtons(tags){
  TAG_DEFS.forEach(([name,id])=>{
    const btn=document.getElementById(id);
    if(btn) btn.classList.toggle('on',!!tags[name]);
  });
}
window.toggleTag=function(tagName){
  if(!detailId)return;
  const m=state.markers[detailId];
  if(!m)return;
  const cur=!!(m.tags||{})[tagName];
  update(ref(db,`markers/${detailId}/tags`),{[tagName]:!cur});
  updateTagButtons({...(m.tags||{}),[tagName]:!cur});
  showToast((!cur?'✅ ':'❌ ')+tagName);
};

let pwBuf='';
function buildNumpad(prefix){
  const pad=document.getElementById(`${prefix}Numpad`);
  pad.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
    const btn=document.createElement('button');
    btn.className='nk'+(k==='⌫'?' del':'');
    btn.textContent=k;
    if(!k){btn.style.visibility='hidden';pad.appendChild(btn);return;}
    btn.addEventListener('click',()=>{
      if(k==='⌫')pwBuf=pwBuf.slice(0,-1);
      else if(pwBuf.length<4)pwBuf+=k;
      updateDots(prefix,pwBuf.length);
      if(pwBuf.length===4)setTimeout(()=>checkAdminPw(prefix),150);
    });
    pad.appendChild(btn);
  });
}
function updateDots(prefix,n){document.getElementById(`${prefix}Dots`).querySelectorAll('.pw-dot').forEach((d,i)=>d.classList.toggle('filled',i<n));}
function checkAdminPw(prefix){
  if(pwBuf===state.adminPw){closeModal('adminModal');isAdmin=true;document.getElementById('adminBar').classList.add('open');renderBoard();showToast('관리자 모드 활성화');}
  else{document.getElementById(`${prefix}Err`).textContent='비밀번호가 틀렸습니다';pwBuf='';updateDots(prefix,0);setTimeout(()=>document.getElementById(`${prefix}Err`).textContent='',2000);}
}

window.saveSettings=function(){
  const ap=document.getElementById('newAdminPw').value.trim();
  if(ap&&!/^\d{4}$/.test(ap)){alert('숫자 4자리');return;}
  if(ap){update(ref(db,'settings'),{adminPw:ap});showToast('비밀번호 변경됨');}
  document.getElementById('newAdminPw').value='';
  closeModal('settingsModal');
};

window.onCartypeChange=function(){
  const val=document.querySelector('input[name="cartype"]:checked')?.value;
  const lblNew=document.getElementById('lbl-new');
  const lblDemo=document.getElementById('lbl-demo');
  const lblDisplay=document.getElementById('lbl-display');
  if(!lblNew||!lblDemo)return;
  lblNew.style.borderColor='var(--border)';lblNew.style.background='transparent';
  lblDemo.style.borderColor='var(--border)';lblDemo.style.background='transparent';
  if(lblDisplay){lblDisplay.style.borderColor='var(--border)';lblDisplay.style.background='transparent';}
  if(val==='new'){lblNew.style.borderColor='var(--accent)';lblNew.style.background='#1c69d415';}
  else if(val==='demo'){lblDemo.style.borderColor='#e74c3c';lblDemo.style.background='#e74c3c15';}
  else if(val==='display'&&lblDisplay){lblDisplay.style.borderColor='#9b59b6';lblDisplay.style.background='#9b59b615';}
};

function populateSeriesSelect(){
  const sel=document.getElementById('mSeries');
  const sg=document.createElement('optgroup');sg.label='── 세단 / 쿠페 / 투어링 ──';
  const sv=document.createElement('optgroup');sv.label='── SUV / SAV ──';
  Object.entries(BMW_MODELS).forEach(([name,data])=>{
    const opt=document.createElement('option');opt.value=name;opt.textContent=name;
    (data.type==='suv'?sv:sg).appendChild(opt);
  });
  sel.appendChild(sg);sel.appendChild(sv);
}

window.onSeriesChange=function(){
  const s=document.getElementById('mSeries').value;
  const tr=document.getElementById('mTrim');
  tr.innerHTML='<option value="">-- 트림 선택 --</option>';
  if(!s||!BMW_MODELS[s])return;
  document.getElementById('mType').value=BMW_MODELS[s].type;
  BMW_MODELS[s].models.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;tr.appendChild(o);});
};

function populateColorSelects(){
  const eS=document.getElementById('mExt'),iS=document.getElementById('mInt');
  Object.entries(EXT).sort().forEach(([c,n])=>{const o=document.createElement('option');o.value=c;o.textContent=`${c} · ${n}`;eS.appendChild(o);});
  Object.entries(INT).sort().forEach(([c,n])=>{const o=document.createElement('option');o.value=c;o.textContent=`${c} · ${n}`;iS.appendChild(o);});
}

function updateZoneSelects(){
  const sel=document.getElementById('mZone');
  const cur=sel.value;
  sel.innerHTML='';
  Object.entries(state.zones).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).forEach(([zid,z])=>{
    const o=document.createElement('option');o.value=zid;o.textContent=z.name;
    if(zid===cur)o.selected=true;
    sel.appendChild(o);
  });
}

function clearForm(){
  ['mModel','mPlate','mOwner','mMemo'].forEach(id=>document.getElementById(id).value='');
  const ctNew=document.getElementById('ct-new');if(ctNew){ctNew.checked=true;}
  onCartypeChange();
  document.getElementById('mSeries').value='';
  document.getElementById('mTrim').innerHTML='<option value="">-- 트림 선택 --</option>';
  document.getElementById('mType').value='sedan';
  document.getElementById('mExt').value='';
  document.getElementById('mInt').value='';
}

// ── 일괄 입력 ─────────────────────────────────────────
let bulkData=[];
function updateBulkZoneSelect(){
  const sel=document.getElementById('bulkZone');
  if(!sel)return;
  sel.innerHTML='';
  Object.entries(state.zones).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).forEach(([zid,z])=>{
    const o=document.createElement('option');o.value=zid;o.textContent=z.name;sel.appendChild(o);
  });
}
window.openBulkModal=function(){
  updateBulkZoneSelect();
  bulkData=[];
  document.getElementById('bulkPaste').value='';
  document.getElementById('bulkPreview').innerHTML='';
  document.getElementById('bulkImportBtn').style.display='none';
  openModal('bulkModal');
};
window.parseBulk=function(){
  const text=document.getElementById('bulkPaste').value.trim();
  if(!text){alert('데이터를 붙여넣기 하세요');return;}
  const SUV_KEYS=['X1','X2','X3','X4','X5','X6','X7','iX1','iX2','iX3','iX ','XM'];
  bulkData=text.split('\n').filter(r=>r.trim()).map(r=>{
    const c=r.split('\t');
    const model=(c[3]||'').trim();
    const plate=(c[5]||'').trim();
    const extColor=(c[6]||'').trim();
    const owner=(c.length>10?c[10]:c[c.length-1]||'').trim();
    if(!model&&!plate)return null;
    const isSuv=SUV_KEYS.some(k=>model.startsWith(k))||/^iX$/i.test(model);
    const cartype=/데모/i.test(owner)?'demo':/보관/i.test(owner)?'display':'new';
    return{model,extColor,plate,owner,type:isSuv?'suv':'sedan',cartype};
  }).filter(Boolean);
  if(!bulkData.length){alert('인식된 데이터가 없습니다');return;}
  const prev=document.getElementById('bulkPreview');
  prev.innerHTML=`
    <div style="font-size:11px;color:var(--text2);margin:8px 0 5px;">${bulkData.length}건 인식됨</div>
    <div style="overflow:auto;max-height:180px;border:1px solid var(--border);border-radius:6px;">
    <table style="width:100%;border-collapse:collapse;font-size:11px;">
      <thead><tr style="background:var(--surface2);position:sticky;top:0;">
        ${['차종명','외장색','차대번호','담당자','구분'].map(h=>`<th style="padding:5px 8px;text-align:left;color:var(--text2);font-weight:600;">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${bulkData.map(d=>`<tr style="border-top:1px solid var(--border);">
        <td style="padding:4px 8px;">${d.model||'-'}</td>
        <td style="padding:4px 8px;">${d.extColor||'-'}</td>
        <td style="padding:4px 8px;">${d.plate||'-'}</td>
        <td style="padding:4px 8px;">${d.owner||'-'}</td>
        <td style="padding:4px 8px;">${d.cartype==='demo'?'🏎️ 시승차':'🚗 신차'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  document.getElementById('bulkImportBtn').style.display='';
};
window.importBulk=function(){
  const zid=document.getElementById('bulkZone').value;
  if(!zid){alert('구역을 선택하세요');return;}
  if(!bulkData.length){alert('먼저 파싱하세요');return;}
  if(!confirm(`${bulkData.length}건을 추가하시겠습니까?`))return;
  const now=Date.now();
  bulkData.forEach(d=>push(ref(db,'markers'),{...d,zoneId:zid,slot:null,memo:'',series:'',createdAt:now,updatedAt:now}));
  closeModal('bulkModal');
  showToast(`${bulkData.length}건 추가됨`);
  bulkData=[];
};

window.onSearch=function(val){searchQuery=val.trim().toLowerCase();renderBoard();};
window.openModal=id=>document.getElementById(id).classList.add('open');
window.closeModal=id=>document.getElementById(id).classList.remove('open');
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

populateSeriesSelect();
populateColorSelects();
initFirebase();
</script>
