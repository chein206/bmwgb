name: Sync to HuggingFace
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      - name: Push to HuggingFace via API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "Girihara/bmwgb"

          readme = (
              "---\n"
              "title: BMW GB Board\n"
              "emoji: \U0001F697\n"
              "colorFrom: blue\n"
              "colorTo: blue\n"
              "sdk: static\n"
              "pinned: false\n"
              "---\n"
          )

          api.upload_file(
              path_or_fileobj=readme.encode("utf-8"),
              path_in_repo="README.md",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Sync README",
          )

          api.upload_file(
              path_or_fileobj="index.html",
              path_in_repo="index.html",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Sync index.html",
          )

          print("Done!")
          PYEOF
