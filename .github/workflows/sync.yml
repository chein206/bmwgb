name: Sync to HuggingFace
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          python3 -c "
          content = '---\ntitle: BMW GB Board\nemoji: \U0001F697\ncolorFrom: blue\ncolorTo: blue\nsdk: static\npinned: false\n---\n'
          with open('README.md', 'w', newline='\n', encoding='utf-8') as f:
              f.write(content)
          "
          git add README.md
          git diff --cached --quiet || git commit -m "Fix HF README"
          git push https://Girihara:${HF_TOKEN}@huggingface.co/spaces/Girihara/bmwgb main --force
