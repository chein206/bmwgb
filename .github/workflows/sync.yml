name: Sync to HuggingFace
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HuggingFace
        run: git push https://Girihara:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Girihara/bmwgb main
